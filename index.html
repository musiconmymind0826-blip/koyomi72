<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0a0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="こよみ">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>こよみ 七十二候</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --gold:#d9b667; --gold2:#e8cd85; --paper:#f3efe6; --ink:#08080a; }
  html, body { height: 100%; background: var(--ink); overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: "Hiragino Mincho ProN", "Shippori Mincho B1", "Yu Mincho", "Noto Serif JP", serif;
    color: var(--paper); user-select: none; -webkit-user-select: none;
    touch-action: pan-y;
  }
  #stage { position: fixed; inset: 0; }
  #scene { position: absolute; inset: 0; width: 100%; height: 100%; }
  #ui { position: absolute; inset: 0; }

  .v { writing-mode: vertical-rl; text-orientation: upright; }

  /* 銘 */
  #brand { position: absolute; top: max(20px, env(safe-area-inset-top)); left: 22px; }
  #brand .t { font-size: 17px; letter-spacing: 7px; }
  #brand .s { font-size: 9px; letter-spacing: 4px; color: rgba(217,182,103,.8); margin-top: 3px; }

  /* 枠ラベル */
  #frame {
    position: absolute; top: max(20px, env(safe-area-inset-top)); right: 18px;
    border: 1px solid rgba(217,182,103,.85); background: rgba(8,8,10,.42);
    padding: 9px 6px; text-align: center; line-height: 1.5;
  }
  #frame .fc { font-size: 12.5px; color: var(--gold); display:block; }
  #frame .div { width: 13px; height: 1px; background: rgba(217,182,103,.85); margin: 6px auto; }
  #today-mark {
    margin-top: 7px; background: #a8281e; color: #f6e9da; font-size: 10px;
    padding: 3px 4px; transform: rotate(2deg); letter-spacing: 1px;
  }

  /* 題字 */
  #title { position: absolute; top: 14%; left: 26px; display: flex; align-items: flex-start; }
  #title .kanji { font-size: var(--ts, 64px); color: var(--gold2); font-weight: 600;
    text-shadow: 0 3px 16px rgba(0,0,0,.65); line-height: 1.12; }
  #title .ruby { margin-left: 6px; padding-top: 12px; }
  #title .ruby span { font-size: 12px; color: rgba(217,182,103,.92); display:block;
    line-height: 1.3; text-align:center; text-shadow: 0 1px 5px rgba(0,0,0,.6); }

  /* 解説（左下） */
  #desc { position: absolute; left: 22px; bottom: 132px; max-height: 42%;
    font-size: 14.5px; line-height: 1.5; letter-spacing: 1px;
    text-shadow: 0 1px 6px rgba(0,0,0,.55); }
  #hanko {
    position: absolute; left: 22px; bottom: 100px;
    background: #a8281e; color: #f6e9da; padding: 5px 6px; font-size: 12px;
    transform: rotate(-2.5deg); line-height: 1.25; width: 30px; text-align: center;
    box-shadow: 0 2px 4px rgba(0,0,0,.4); font-weight: 600;
  }

  /* 脇情報（右下） */
  #side { position: absolute; right: 22px; bottom: 132px; text-align: center;
    font-size: 11.5px; line-height: 1.4; letter-spacing: 1px; }
  #side .sekki { color: rgba(243,239,230,.78); }
  #side .toki { color: var(--gold); margin-top: 10px; }

  /* フッター */
  #footer { position: absolute; left: 0; right: 0; bottom: 0;
    padding: 0 22px calc(20px + env(safe-area-inset-bottom)); }
  #btns { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .btn { border: 1px solid rgba(217,182,103,.75); background: rgba(8,8,10,.5);
    color: var(--gold); font-size: 11.5px; letter-spacing: 2px; padding: 6px 12px;
    font-family: inherit; cursor: pointer; }
  .btn.off { color: rgba(243,239,230,.45); }
  #track { height: 2px; background: rgba(243,239,230,.14); }
  #fill { height: 2px; background: var(--gold); transition: width .3s; }
  #hint { font-size: 9px; letter-spacing: 1px; color: rgba(243,239,230,.5);
    text-align: center; margin-top: 8px; }

  /* 栞 */
  #shiori { position: absolute; inset: 0; background: rgba(5,5,8,.66);
    display: none; align-items: center; justify-content: center; padding: 22px; }
  #shiori.on { display: flex; }
  #sheet { border: 1px solid rgba(217,182,103,.7); background: rgba(10,10,13,.94);
    padding: 22px 18px; width: 100%; max-width: 380px; text-align: center; }
  #sheet h2 { font-size: 15px; color: var(--gold); letter-spacing: 4px; font-weight: 400; }
  #sheet .hr { width: 52%; height: 1px; background: rgba(217,182,103,.7); margin: 14px auto; }
  #cols { display: flex; flex-direction: row-reverse; justify-content: center; gap: 18px; }
  #cols .col { max-width: 80px; }
  #cols .ct { color: rgba(217,182,103,.95); font-size: 11px; line-height: 1.4; margin-bottom: 6px; }
  #cols .cr { width: 12px; height: 1px; background: rgba(217,182,103,.6); margin: 0 auto 8px; }
  #cols .cb { font-size: 13.5px; line-height: 1.5; }
  #sheet .note { font-size: 9.5px; color: rgba(243,239,230,.45); margin-top: 18px; }
  #sheet .close { font-size: 10.5px; color: rgba(243,239,230,.6); margin-top: 8px; letter-spacing: 3px; }

  /* 入場フェード */
  .fade { opacity: 0; transform: translateY(14px); transition: opacity .9s, transform .9s; }
  .fade.in { opacity: 1; transform: none; }

  /* ホーム追加の案内 */
  #a2hs { position: absolute; left: 16px; right: 16px; bottom: calc(96px + env(safe-area-inset-bottom));
    background: rgba(10,10,13,.95); border: 1px solid rgba(217,182,103,.6);
    padding: 14px 16px; font-size: 12.5px; line-height: 1.7; display: none; }
  #a2hs.on { display: block; }
  #a2hs b { color: var(--gold); }
  #a2hs .x { float: right; color: rgba(243,239,230,.5); cursor: pointer; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="scene"></canvas>
  <div id="ui">
    <div id="brand"><div class="t">こよみ</div><div class="s">七十二候</div></div>
    <div id="frame" class="fade"></div>
    <div id="title" class="fade"></div>
    <div id="desc" class="v fade"></div>
    <div id="hanko" class="v fade">歳時記行</div>
    <div id="side" class="fade">
      <div class="sekki v"></div>
      <div class="toki v"></div>
    </div>
    <div id="footer">
      <div id="btns">
        <button class="btn" id="b-shiori">栞</button>
        <button class="btn" id="b-today" style="visibility:hidden">今日へ戻る</button>
        <button class="btn" id="b-sound">♪</button>
      </div>
      <div id="track"><div id="fill"></div></div>
      <div id="hint">左右に繰って季節を巡る ・ 触れると波紋</div>
    </div>
    <div id="a2hs">
      <span class="x" id="a2hs-x">✕</span>
      <b>ホーム画面に追加</b>すると、アプリのように全画面で使えます。<br>
      下の <b>共有ボタン</b> → <b>「ホーム画面に追加」</b>。
    </div>
  </div>
  <div id="shiori">
    <div id="sheet">
      <h2 id="sh-head"></h2>
      <div class="hr"></div>
      <div id="cols"></div>
      <div class="note">※ 音はすべて本アプリ内で生成した創作の自然音です</div>
      <div class="close">とじる（画面に触れる）</div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="engine.js"></script>
<script src="particles.js"></script>
<script src="sound.js"></script>
<script src="app.js"></script>
</body>
</html>
